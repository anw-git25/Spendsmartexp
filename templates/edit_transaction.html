{% extends 'base.html' %}
{% block content %}
<div class="section card">
    <h2>Edit Transaction</h2>
    <form method="post">
        <div class="form-grid">
            <div class="input-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{{ transaction['title'] }}" required>
            </div>
            <div class="input-group">
                <label for="amount">Amount</label>
                <input type="number" step="0.01" id="amount" name="amount" value="{{ transaction['amount'] }}" required>
            </div>
            <div class="input-group">
                <label for="type">Type</label>
                <select id="type" name="type" required>
                    <option value="income" {% if transaction['type'] == 'income' %}selected{% endif %}>Income</option>
                    <option value="expense" {% if transaction['type'] == 'expense' %}selected{% endif %}>Expense</option>
                </select>
            </div>
            <div class="input-group">
                <label for="category">Category</label>
                <select id="category" name="category" required>
                    {% for category in categories %}
                    <option value="{{ category['id'] }}" {% if category['id'] == transaction['category_id'] %}selected{% endif %}>{{ category['name'] }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <button type="submit" class="button" style="margin-top: 1rem;">Update Transaction</button>
    </form>
</div>
{% endblock %}
